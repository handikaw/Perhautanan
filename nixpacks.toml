# Nixpacks configuration for Laravel 11 on Railway
# This file tells Railway how to build and run your application

[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'nodejs']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci --include=dev'
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan route:cache',
    'php artisan view:cache'
]

[start]
cmd = 'php artisan config:clear && php artisan migrate --force && php -S 0.0.0.0:$PORT -t public'

[variables]
NODE_ENV = 'production'
