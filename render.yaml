services:
  - type: web
    name: perhutanan-app
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader --no-interaction
      npm ci --include=dev
      npm run build
      php artisan config:clear
      php artisan view:clear
      php artisan route:cache
      php artisan view:cache
    startCommand: |
      php artisan config:clear
      php artisan migrate --force
      php artisan storage:link || true
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: SaaS Perhutanan
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: FILESYSTEM_DISK
        value: public

databases:
  - name: perhutanan-db
    databaseName: db_perhutanan
    user: perhutanan
